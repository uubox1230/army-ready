<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARMY READY 💜</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="android-chrome-2000x2000.png">
  <link rel="apple-touch-icon" href="android-chrome-2000x2000.png">
</head>

<body>
  <main class="app">
    <section class="hero">
      <div class="logo">💜</div>
      <p class="eyebrow">BTS FAN CHANT PRACTICE</p>
      <h1>ARMY READY</h1>
      <p class="subtitle">希望可以幫助到大家練習應援！我們高雄場見唷～</p>
    </section>

    <section class="progress-card">
      <p>練習進度</p>
      <span id="progressText">0 / 21 completed</span>
      <div class="progress-bar">
        <div id="progressBar"></div>
      </div>
    </section>

    <section class="song-section">
      <h2>Setlist</h2>

      <input
        id="songSearch"
        class="song-search"
        type="search"
        placeholder="搜尋歌曲..."
        oninput="renderHome()"
      />

      <div id="songList" class="song-list"></div>
    </section>

    <div class="home-fab-menu" id="homeFabMenu">
      <button class="fab-action" id="installBtn" type="button">
        <span class="fab-icon">📱</span>
        <span>加到主畫面</span>
      </button>

      <button class="fab-action" id="shareBtn" type="button">
        <span class="fab-icon">💜</span>
        <span>分享給朋友</span>
      </button>

      <div class="fab-divider"></div>

      <a class="fab-action" href="https://www.instagram.com/uu_box_/" target="_blank" rel="noopener">
        <svg class="social-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.75 2h8.5A5.76 5.76 0 0 1 22 7.75v8.5A5.76 5.76 0 0 1 16.25 22h-8.5A5.76 5.76 0 0 1 2 16.25v-8.5A5.76 5.76 0 0 1 7.75 2Zm0 2A3.75 3.75 0 0 0 4 7.75v8.5A3.75 3.75 0 0 0 7.75 20h8.5A3.75 3.75 0 0 0 20 16.25v-8.5A3.75 3.75 0 0 0 16.25 4h-8.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Zm5.25-2.2a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4Z"/>
        </svg>
        <span>追蹤 uubox</span>
      </a>

      <a class="fab-action" href="https://x.com/uu_box_" target="_blank" rel="noopener">
        <span class="social-icon x-icon">𝕏</span>
        <span>追蹤 uubox</span>
      </a>

      <button class="fab-main" onclick="toggleHomeFab()" type="button">
        💜
      </button>
    </div>
  </main>

  <section id="songPage" class="song-page hidden">

  <div class="song-header-row">
    <button class="back-btn" onclick="backHome()">← 歌單</button>
    <button id="doneBtn" class="done-chip" onclick="toggleDone()">○ 未練習</button>
  </div>

  <h1 id="songTitle">Song Title</h1>
  <p id="songNote">官方 Fan Chant + 現場練習提醒。</p>

  <div class="song-actions">
    <div class="mode-switch">
      <button id="readModeBtn" onclick="showReadMode()">完整歌詞</button>
      <button id="practiceModeBtn" onclick="startPractice()">練習模式</button>
    </div>
  </div>

    <div id="readMode" class="read-mode"></div>

    <div id="practiceMode" class="practice-mode hidden">
      <div class="practice-top">
        <span id="practiceCounter">1 / 8</span>
      </div>

      <section id="currentCard" class="practice-card current">
        <div id="practiceBadge" class="badge sing">🎤 跟唱</div>
        <div id="practiceText" class="practice-text">準備開始</div>
      </section>

      <section id="nextCard" class="practice-card next">
        <p class="next-title">下一句</p>
        <div id="nextBadge" class="badge chant">💙 應援</div>
        <div id="nextPracticeText" class="next-text">下一句會顯示在這裡</div>
      </section>

      <div class="practice-controls">
        <button onclick="prevLine()">◀︎</button>
        <button onclick="nextLine()">▶︎</button>
      </div>
    </div>

    <div class="fab-menu" id="fabMenu">
      <button class="fab-action" onclick="backHome()">← 歌單</button>
      <button class="fab-action" onclick="goPrevSong()">上一首</button>
      <button class="fab-action" onclick="goNextSong()">下一首</button>

      <button class="fab-main" onclick="toggleFab()" aria-label="開啟快捷選單">
        ☰
      </button>
    </div>
  </section>

  <script src="songs.js"></script>
  <script src="app.js"></script>
</body>
</html>

<footer class="site-footer">
  <div class="footer-credit">
    2026.07 • TAIWAN ARMY • Made with 💜 by <span>@uu_box_</span>
  </div>

  <div class="footer-links">
    <a
      href="https://www.instagram.com/uu_box_/"
      target="_blank"
      rel="noopener noreferrer"
    >
      Instagram
    </a>

    <span>•</span>

    <a
      href="https://x.com/uu_box_"
      target="_blank"
      rel="noopener noreferrer"
    >
      X (Twitter)
    </a>
  </div>
</footer>
