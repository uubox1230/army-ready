<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARMY READY Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <section class="hero">
      <div class="logo">⚙️</div>
      <p class="eyebrow">ARMY READY STUDIO</p>
      <h1>Studio</h1>
      <p class="subtitle">貼上官方 Fan Chant Guide，快速整理成 App 可用格式。</p>
    </section>

    <section class="editor-card">
      <label>歌曲名稱</label>
      <input id="songTitleInput" placeholder="Come Over" />

      <label>歌曲 ID</label>
      <input id="songIdInput" placeholder="hooligan / run-bts / fake-love" />

      <label>備註</label>
      <input id="songNoteInput" placeholder="Knock knock 那段記得大喊 B! T! S!" />

      <label>切入提示</label>
      <input id="songCueInput" placeholder="從參考音檔 1:59 前奏變化這邊開始喊" />

      <label>切入音檔路徑</label>
      <input id="songCueAudioInput" placeholder="audio/hooligan-intro.mp3" />

      <label>Apple Music 連結</label>
      <input id="appleUrlInput" placeholder="https://music.apple.com/..." />

      <label>Spotify 連結</label>
      <input id="spotifyUrlInput" placeholder="https://open.spotify.com/track/..." />

      <label>YouTube Music 連結</label>
      <input id="youtubeMusicUrlInput" placeholder="https://music.youtube.com/watch?v=..." />

      <label>貼上完整 Fan Chant Guide</label>
      <textarea id="rawText" placeholder="把 Weverse Fan Chant Guide 文字貼在這裡"></textarea>

      <button onclick="parseRawText()">解析文字</button>
    </section>

    <section class="editor-card">
    <h2>⏱ Timing Editor</h2>
    <p class="editor-hint">選擇歌曲後，按 Space 記錄目前秒數到該句歌詞。</p>

    <label>選擇現有歌曲</label>
    <select id="timingSongSelect" onchange="loadTimingSong()"></select>

    <div class="timing-controls">
        <button onclick="startTiming()">開始標時間</button>
        <button onclick="pauseTiming()">暫停</button>
        <button onclick="resetTiming()">重設秒數</button>
    </div>

    <div class="timing-panel">
        <div>
        <p class="editor-hint">目前秒數</p>
        <div id="timingClock" class="timing-clock">0.00s</div>
        </div>

        <div>
        <p class="editor-hint">目前句</p>
        <div id="timingCurrentLine" class="timing-current-line">請先選擇歌曲</div>
        </div>
    </div>

    <div class="timing-controls">
        <button onclick="prevTimingLine()">← 上一句</button>
        <button onclick="markTiming()">Space：標記</button>
        <button onclick="nextTimingLine()">下一句 →</button>
    </div>

    <div id="timingLineList" class="timing-line-list"></div>

    <button onclick="exportTimedSong()">匯出這首歌 JSON</button>
    </section>

    <section class="editor-card">
      <h2>逐行標記</h2>
      <p class="editor-hint">點選每一行的類型：歌詞、跟唱、應援、歡呼。</p>
      <div id="lineEditor"></div>
    </section>

    <section class="editor-card">
      <h2>匯出 JSON</h2>
      <button onclick="exportSong()">產生 JSON</button>
      <textarea id="outputJson" readonly></textarea>
    </section>
  </main>

  <script src="songs.js"></script>
  <script src="editor.js"></script>
</body>
</html>
